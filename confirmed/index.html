<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>You're Approved — NEBO UltraWash</title>
<meta name="description" content="Your 0% financing plan is locked in. Reference code and next steps inside.">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#0d3fd6">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Archivo:ital,wght@0,700;0,800;1,800;1,900&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#0d3fd6;--blue-deep:#06208f;--blue-bright:#1f63ff;
    --cyan:#36ccff;--gold:#ffc21a;--magenta:#ff2e6e;
    --ink:#0a1530;--mut:#5d6b8f;--good:#16a34a;
    --line:#e2e8f3;--card:#fff;--bg:#06208f;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Inter",system-ui,sans-serif;color:var(--ink);background:var(--bg);
    background:linear-gradient(180deg,#0d3fd6 0%,#06208f 60%);min-height:100vh;
    -webkit-font-smoothing:antialiased;line-height:1.55}
  img{display:block;max-width:100%}
  a{color:var(--blue);text-decoration:none}

  .wrap{max-width:560px;margin:0 auto;padding:clamp(20px,5vw,42px) clamp(14px,4vw,24px) 60px}

  /* main card */
  .card{background:#fff;border-radius:clamp(16px,3.5vw,24px);overflow:hidden;
    box-shadow:0 30px 70px -16px rgba(0,0,0,.5);animation:pop .45s cubic-bezier(.2,1.2,.3,1)}
  @keyframes pop{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}

  /* header section — cobalt + bubbles + logo + check */
  .head{position:relative;padding:clamp(28px,6vw,42px) clamp(18px,4vw,28px);
    background:linear-gradient(160deg,#1a4cf0,#0a2db0);color:#fff;text-align:center;overflow:hidden}
  .head:before{content:"";position:absolute;inset:0;
    background:url("/assets/bg-bubbles.jpg") repeat;background-size:120% auto;opacity:.55;
    -webkit-mask-image:linear-gradient(to bottom,#000 0,#000 75%,transparent 100%);
    mask-image:linear-gradient(to bottom,#000 0,#000 75%,transparent 100%)}
  .head>*{position:relative;z-index:2}
  .logo{height:clamp(42px,11vw,58px);width:auto;display:block;margin:0 auto clamp(14px,3vw,22px);
    filter:drop-shadow(0 2px 6px rgba(0,8,40,.5))}
  .check{width:clamp(60px,16vw,80px);height:clamp(60px,16vw,80px);border-radius:50%;
    margin:0 auto clamp(12px,3vw,18px);
    background:linear-gradient(180deg,#36ccff,#1f63ff);display:grid;place-items:center;
    color:#fff;font-size:clamp(32px,9vw,42px);font-weight:900;line-height:1;
    box-shadow:0 0 0 7px rgba(54,204,255,.22),0 14px 30px -10px rgba(13,63,214,.6)}
  .head h1{font-family:"Archivo";font-style:italic;font-weight:900;
    font-size:clamp(28px,7vw,40px);letter-spacing:-.5px;line-height:1.05}
  .head h1 em{color:#9fe5ff;font-style:italic}
  .tag{display:inline-block;background:var(--gold);color:#3a2600;font-weight:800;
    font-size:clamp(10px,2.8vw,12px);letter-spacing:.12em;padding:5px clamp(10px,2.4vw,14px);
    border-radius:999px;text-transform:uppercase;margin-top:clamp(10px,2.4vw,14px)}

  /* body */
  .body{padding:clamp(20px,4vw,30px) clamp(18px,4vw,28px) clamp(16px,3.5vw,24px)}
  .greet{font-size:clamp(15px,3.5vw,17px);color:var(--mut);text-align:center;line-height:1.55;margin-bottom:clamp(18px,3.5vw,24px)}
  .greet b{color:var(--ink)}

  /* reference code */
  .ref{background:#f3f6ff;border:1.5px dashed #b9c8ee;border-radius:14px;
    padding:clamp(14px,3vw,18px);text-align:center;margin-bottom:clamp(18px,3.5vw,24px)}
  .ref .lbl{font-size:clamp(10px,2.6vw,11px);font-weight:800;letter-spacing:.18em;
    text-transform:uppercase;color:var(--mut);margin-bottom:5px}
  .ref .code{font-family:"Archivo";font-style:italic;font-weight:900;
    font-size:clamp(24px,7vw,32px);letter-spacing:.04em;color:var(--blue);user-select:all;word-break:break-all}
  .ref .save{font-size:clamp(11px,2.6vw,12px);color:var(--mut);margin-top:6px}

  /* check-email banner */
  .mail{display:flex;align-items:center;gap:12px;background:#e7eeff;border-radius:12px;
    padding:14px 16px;margin-bottom:clamp(18px,3.5vw,24px);font-size:13.5px;color:var(--ink)}
  .mail .ic{flex:none;width:36px;height:36px;border-radius:50%;background:#fff;
    display:grid;place-items:center;color:var(--blue);font-weight:900;font-size:20px}
  .mail b{font-weight:700}
  .mail .em{color:var(--blue);font-weight:700;word-break:break-all}

  /* summary block */
  .label{font-family:"Archivo";font-style:italic;font-weight:900;font-size:11px;
    letter-spacing:.18em;text-transform:uppercase;color:var(--blue);margin-bottom:10px}
  .summary{background:#f3f6ff;border:1px solid var(--line);border-radius:14px;overflow:hidden;
    margin-bottom:clamp(18px,3.5vw,24px)}
  .row{display:flex;justify-content:space-between;align-items:baseline;gap:14px;
    padding:12px 16px;border-top:1px solid #e7eaf1;font-size:13.5px}
  .row:first-child{border-top:0}
  .row span{color:var(--mut);font-weight:600;text-transform:uppercase;font-size:11.5px;letter-spacing:.06em}
  .row b{color:var(--ink);font-weight:700;text-align:right}
  .row.big{background:rgba(54,204,255,.10)}
  .row.big b{color:var(--blue);font-family:"Archivo";font-style:italic;font-weight:900;font-size:18px}

  /* signature */
  .sig{background:#0a2db0;background:linear-gradient(160deg,#1a4cf0,#0a2db0);
    border-radius:14px;padding:14px 16px;text-align:center;color:#fff;margin-bottom:clamp(18px,3.5vw,24px);
    overflow:hidden;position:relative}
  .sig:before{content:"";position:absolute;inset:0;background:url("/assets/bg-bubbles.jpg") repeat;
    background-size:300px auto;opacity:.18;pointer-events:none}
  .sig>*{position:relative;z-index:2}
  .sig .lbl{font-size:10.5px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:#9fe5ff;margin-bottom:8px}
  .sig img{max-width:100%;height:auto;display:block;margin:0 auto;filter:drop-shadow(0 0 6px rgba(54,204,255,.25))}

  /* steps */
  .steps{list-style:none;display:flex;flex-direction:column;gap:10px;margin-bottom:clamp(18px,3.5vw,22px)}
  .steps li{display:flex;align-items:center;gap:12px;padding:12px 14px;background:#fff;
    border:1px solid var(--line);border-radius:11px;font-size:13.5px;font-weight:600;color:var(--ink)}
  .steps li .n{flex:none;width:26px;height:26px;border-radius:50%;
    background:linear-gradient(160deg,#3a78ff,#0d3fd6);color:#fff;display:grid;place-items:center;
    font-family:"Archivo";font-style:italic;font-weight:900;font-size:13px}

  /* trust */
  .trust{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;padding-top:16px;border-top:1px solid #eef2fb;
    font-size:12.5px;font-weight:600;color:var(--mut)}
  .trust span{display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
  .trust .ck{width:14px;height:14px;border-radius:50%;background:#dcf3e3;color:var(--good);
    font-size:10px;font-weight:900;display:grid;place-items:center}

  /* footer */
  .foot{text-align:center;padding:clamp(22px,4vw,30px) clamp(18px,4vw,28px);background:#f7f9fd}
  .foot p{font-size:13px;color:var(--mut);margin-bottom:14px}
  .home-btn{display:inline-flex;align-items:center;gap:8px;font-family:"Archivo";font-style:italic;
    font-weight:800;font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--blue);
    background:#e7eeff;padding:10px 18px;border-radius:999px;transition:.16s}
  .home-btn:hover{background:#d8e3ff}

  /* no-data fallback */
  .empty{text-align:center;padding:60px 20px;color:#cdd9e4}
  .empty h2{font-family:"Archivo";font-style:italic;font-weight:900;font-size:24px;margin-bottom:10px}
  .empty p{font-size:14px;margin-bottom:18px;color:#a8b6d1}
  .empty a{display:inline-block;background:#fff;color:var(--blue);font-weight:700;padding:12px 22px;border-radius:10px}
</style>
</head>
<body>

<div class="wrap" id="wrap">
  <!-- Filled in by JS from sessionStorage. Empty fallback shown if no data. -->
</div>

<template id="tpl-card">
  <div class="card">
    <div class="head">
      <img class="logo" src="/assets/nebo-logo.png" alt="NEBO UltraWash">
      <div class="check">✓</div>
      <h1>You're <em>Approved</em>.</h1>
      <span class="tag">Instant Approval</span>
    </div>
    <div class="body">
      <p class="greet">Hi <b data-fld="firstName">there</b> — your <b>0% financing</b> plan is locked in. <b data-fld="depositLine">Your deposit was received</b>; monthly installments start after your appointment.</p>

      <div class="ref">
        <div class="lbl">Your Reference Code</div>
        <div class="code" data-fld="referenceCode">NEBO-XXXXXX</div>
        <div class="save">Save this — show it at your appointment.</div>
      </div>

      <div class="mail">
        <span class="ic">✉</span>
        <div><b>Check your email</b> &mdash; we sent a confirmation to <span class="em" data-fld="email">you@email.com</span></div>
      </div>

      <div class="label">Your Plan</div>
      <div class="summary">
        <div class="row"><span>Vehicle</span><b data-fld="vehicle">—</b></div>
        <div class="row"><span>Service(s)</span><b data-fld="services">—</b></div>
        <div class="row"><span>Plan length</span><b data-fld="plan">—</b></div>
        <div class="row"><span>Service total</span><b data-fld="serviceTotal">—</b></div>
        <div class="row big"><span>Deposit paid</span><b data-fld="deposit">—</b></div>
        <div class="row"><span>Monthly payment</span><b data-fld="monthly">—</b></div>
      </div>

      <div class="sig" data-fld="sigBlock">
        <div class="lbl">Signed by <span data-fld="sigName">—</span></div>
        <img data-fld="signatureImage" alt="Signature">
      </div>

      <div class="label">What Happens Next</div>
      <ol class="steps">
        <li><span class="n">1</span>Save your reference code (sent in your email too).</li>
        <li><span class="n">2</span><a href="/detailing" style="color:inherit">Book your appointment</a> at our scheduling page.</li>
        <li><span class="n">3</span>Drop off your car — we verify ID and start your service.</li>
      </ol>

      <div class="trust">
        <span><span class="ck">✓</span>0% interest</span>
        <span><span class="ck">✓</span>Locked in</span>
        <span><span class="ck">✓</span>No surprises</span>
      </div>
    </div>
    <div class="foot">
      <p>Questions? Reply to your confirmation email or call us.</p>
      <a class="home-btn" href="/">← Back to home</a>
    </div>
  </div>
</template>

<template id="tpl-empty">
  <div class="empty">
    <h2>No application found</h2>
    <p>We couldn't find a recent application in this browser. If you just submitted, refresh — otherwise start a new one.</p>
    <a href="/">Start a 0% financing application →</a>
  </div>
</template>

<script>
(function(){
  const wrap=document.getElementById('wrap');
  let data={};
  try{data=JSON.parse(sessionStorage.getItem('nebo_confirmation')||'{}');}catch(e){}
  if(!data || !data.referenceCode){
    wrap.appendChild(document.getElementById('tpl-empty').content.cloneNode(true));
    return;
  }

  const card=document.getElementById('tpl-card').content.cloneNode(true);

  // Fill fields
  const set=(key,val)=>{
    card.querySelectorAll(`[data-fld="${key}"]`).forEach(el=>{
      if(el.tagName==='IMG') el.src=val||'';
      else el.textContent=val;
    });
  };
  const fmt=n=>'$'+Math.round(+n||0).toLocaleString();

  set('firstName', data.firstName||'there');
  set('referenceCode', data.referenceCode);
  set('email', data.email||'');
  set('vehicle', data.vehicle||'—');
  set('services', Array.isArray(data.services)?data.services.join(' + '):(data.services||'—'));
  set('plan', data.plan||'—');
  set('serviceTotal', data.serviceTotal?fmt(data.serviceTotal):'—');
  set('deposit', data.deposit?fmt(data.deposit)+' ✓':'—');
  set('monthly', data.monthly?fmt(data.monthly)+'/mo':'—');
  set('depositLine', data.deposit?`Your ${fmt(data.deposit)} deposit was received`:'Your application was received');

  if(data.signatureImage){
    set('signatureImage', data.signatureImage);
    set('sigName', ((data.firstName||'')+' '+(data.lastName||'')).trim()||'You');
  }else{
    card.querySelector('[data-fld="sigBlock"]').style.display='none';
  }

  wrap.appendChild(card);
  // Optional: clear once consumed so refresh doesn't replay
  // sessionStorage.removeItem('nebo_confirmation');
})();
</script>
</body>
</html>
